name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'Frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_FRONTEND_IP }} >> ~/.ssh/known_hosts

    - name: SSH to EC2 and Deploy Frontend
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_FRONTEND_IP }} << 'EOF'
          set -e
          rm -rf ~/deploy-temp
          git clone https://${{ secrets.GH_PAT }}github.com/EvilEnforcer/Resume-Screener.git ~/deploy-temp

          # Replace frontend
          rm -rf ~/frontend
          cp -r ~/deploy-temp/Frontend ~/frontend

          # Rebuild container
          cd ~
          docker compose up -d --build

          rm -rf ~/deploy-temp
        EOF
