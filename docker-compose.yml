services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: resume_screener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flaskapi:
    build:
      context: ./Backend/bert-api
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: 5050
    ports:
      - "5050:5050"

  backend:
    build:
      context: ./Backend/resume-screener
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_URL: jdbc:postgresql://postgres:5432/resume_screener
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      AI_SERVICE_URL: http://flaskapi:5050
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      flaskapi:
        condition: service_started

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: http://localhost:8081
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
